services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lunamhub}
      POSTGRES_USER: ${POSTGRES_USER:-lunam}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lunam} -d ${POSTGRES_DB:-lunamhub}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: artifacts/api-server/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: "8080"
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-lunam}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-lunamhub}}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET must be set in .env}
      LOCAL_PHOTO_DIR: /data/photos
      APP_PASSWORD: ${APP_PASSWORD:-}
      HOUSEHOLD_TIME_ZONE: ${HOUSEHOLD_TIME_ZONE:-Australia/Sydney}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      GOOGLE_OAUTH_REDIRECT_URI: ${GOOGLE_OAUTH_REDIRECT_URI:-}
    volumes:
      - photos_data:/data/photos

  web:
    build:
      context: .
      dockerfile: artifacts/lunam-hub/Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-3000}:80"

volumes:
  pgdata:
  photos_data:
